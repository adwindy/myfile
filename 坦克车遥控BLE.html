<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32坦克遥控</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        
        body {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: #f0f0f0;
        }
        
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        
        .ble-status {
            text-align: center;
            margin: 20px 0;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
        }
        
        .disconnected {
            background-color: #ffeeee;
            color: #dc3545;
        }
        
        .connected {
            background-color: #e8f5e9;
            color: #28a745;
        }
        
        button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
            transition: background-color 0.3s;
        }
        
        #connectBtn {
            background-color: #007bff;
            color: white;
            display: block;
            margin: 0 auto 20px;
            padding: 15px 30px;
            font-size: 18px;
        }
        
        #connectBtn:hover {
            background-color: #0056b3;
        }
        
        .control-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }
        
        .track-control {
            width: 300px;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 10px;
        }
        
        .track-control h2 {
            text-align: center;
            margin-bottom: 15px;
            color: #444;
        }
        
        .slider-container {
            margin: 20px 0;
        }
        
        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 4px;
        }
        
        .speed-display {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            margin: 10px 0;
            color: #333;
        }
        
        .direction-controls {
            text-align: center;
            margin: 20px 0;
        }
        
        .direction-btn {
            width: 80px;
            height: 80px;
            font-size: 24px;
            background-color: #28a745;
            color: white;
        }
        
        .direction-btn:hover {
            background-color: #218838;
        }
        
        .stop-btn {
            background-color: #dc3545;
            color: white;
            font-size: 20px;
            padding: 15px 40px;
        }
        
        .stop-btn:hover {
            background-color: #c82333;
        }
        
        .control-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 300px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ESP32坦克遥控</h1>
        
        <button id="connectBtn">连接BLE设备</button>
        <div id="bleStatus" class="ble-status disconnected">未连接BLE设备</div>
        
        <!-- 方向控制区 -->
        <div class="direction-controls">
            <h2>坦克方向控制</h2>
            <div class="control-grid">
                <button class="direction-btn" id="forwardBtn">↑</button>
                <button class="direction-btn" id="leftBtn">←</button>
                <button class="direction-btn" id="rightBtn">→</button>
                <button class="direction-btn" id="backwardBtn">↓</button>
            </div>
            <br>
            <button class="stop-btn" id="stopBtn">停止</button>
        </div>
        
        <!-- 独立履带控制区 -->
        <div class="control-panel">
            <div class="track-control">
                <h2>左履带控制</h2>
                <div class="slider-container">
                    <input type="range" id="leftTrackSlider" min="-100" max="100" value="0" step="1">
                    <div class="speed-display" id="leftSpeed">速度: 0</div>
                </div>
                <button onclick="setLeftSpeed(100)">前进</button>
                <button onclick="setLeftSpeed(-100)">后退</button>
                <button onclick="setLeftSpeed(0)">停止</button>
            </div>
            
            <div class="track-control">
                <h2>右履带控制</h2>
                <div class="slider-container">
                    <input type="range" id="rightTrackSlider" min="-100" max="100" value="0" step="1">
                    <div class="speed-display" id="rightSpeed">速度: 0</div>
                </div>
                <button onclick="setRightSpeed(100)">前进</button>
                <button onclick="setRightSpeed(-100)">后退</button>
                <button onclick="setRightSpeed(0)">停止</button>
            </div>
        </div>
    </div>

    <script>
        // BLE相关变量
        let bluetoothDevice = null;
        let characteristic = null;
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b"; // ESP32的BLE服务UUID
        const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8"; // 特征值UUID
        
        // DOM元素
        const connectBtn = document.getElementById('connectBtn');
        const bleStatus = document.getElementById('bleStatus');
        const leftTrackSlider = document.getElementById('leftTrackSlider');
        const rightTrackSlider = document.getElementById('rightTrackSlider');
        const leftSpeedDisplay = document.getElementById('leftSpeed');
        const rightSpeedDisplay = document.getElementById('rightSpeed');
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 绑定BLE连接按钮
            connectBtn.addEventListener('click', connectBLE);
            
            // 绑定滑块事件
            leftTrackSlider.addEventListener('input', updateLeftSpeed);
            rightTrackSlider.addEventListener('input', updateRightSpeed);
            
            // 绑定方向控制按钮
            document.getElementById('forwardBtn').addEventListener('click', () => setBothSpeed(100, 100));
            document.getElementById('backwardBtn').addEventListener('click', () => setBothSpeed(-100, -100));
            document.getElementById('leftBtn').addEventListener('click', () => setBothSpeed(-50, 50));
            document.getElementById('rightBtn').addEventListener('click', () => setBothSpeed(50, -50));
            document.getElementById('stopBtn').addEventListener('click', () => setBothSpeed(0, 0));
        });
        
        // 连接BLE设备
        async function connectBLE() {
            try {
                // 请求蓝牙设备
                bluetoothDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'ESP32' }], // 根据你的ESP32设备名称调整
                    optionalServices: [SERVICE_UUID]
                });
                
                // 连接GATT服务器
                const server = await bluetoothDevice.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);
                
                // 更新状态
                bleStatus.textContent = `已连接: ${bluetoothDevice.name}`;
                bleStatus.className = 'ble-status connected';
                connectBtn.textContent = '断开连接';
                connectBtn.removeEventListener('click', connectBLE);
                connectBtn.addEventListener('click', disconnectBLE);
                
                // 监听设备断开
                bluetoothDevice.addEventListener('gattserverdisconnected', onDisconnected);
                
            } catch (error) {
                console.error('BLE连接错误:', error);
                bleStatus.textContent = `连接失败: ${error.message}`;
                bleStatus.className = 'ble-status disconnected';
            }
        }
        
        // 断开BLE连接
        function disconnectBLE() {
            if (bluetoothDevice && bluetoothDevice.gatt.connected) {
                bluetoothDevice.gatt.disconnect();
            }
            onDisconnected();
        }
        
        // 处理断开连接
        function onDisconnected() {
            bluetoothDevice = null;
            characteristic = null;
            bleStatus.textContent = '未连接BLE设备';
            bleStatus.className = 'ble-status disconnected';
            connectBtn.textContent = '连接BLE设备';
            connectBtn.removeEventListener('click', disconnectBLE);
            connectBtn.addEventListener('click', connectBLE);
        }
        
        // 发送数据到ESP32
        async function sendData(leftSpeed, rightSpeed) {
            if (!characteristic) {
                alert('请先连接BLE设备！');
                return;
            }
            
            try {
                // 格式化数据: LxxxRxxx (例如 L100R50 表示左履带100，右履带50)
                const left = leftSpeed.toString().padStart(3, leftSpeed >= 0 ? '0' : '-');
                const right = rightSpeed.toString().padStart(3, rightSpeed >= 0 ? '0' : '-');
                const data = `L${left}R${right}`;
                
                // 转换为Uint8Array并发送
                const encoder = new TextEncoder();
                await characteristic.writeValue(encoder.encode(data));
                
                console.log(`发送数据: ${data}`);
            } catch (error) {
                console.error('发送数据失败:', error);
                alert('发送数据失败，请重新连接！');
            }
        }
        
        // 更新左履带速度显示并发送
        function updateLeftSpeed() {
            const speed = parseInt(leftTrackSlider.value);
            leftSpeedDisplay.textContent = `速度: ${speed}`;
            sendData(speed, parseInt(rightTrackSlider.value));
        }
        
        // 更新右履带速度显示并发送
        function updateRightSpeed() {
            const speed = parseInt(rightTrackSlider.value);
            rightSpeedDisplay.textContent = `速度: ${speed}`;
            sendData(parseInt(leftTrackSlider.value), speed);
        }
        
        // 设置左履带速度
        function setLeftSpeed(speed) {
            leftTrackSlider.value = speed;
            leftSpeedDisplay.textContent = `速度: ${speed}`;
            sendData(speed, parseInt(rightTrackSlider.value));
        }
        
        // 设置右履带速度
        function setRightSpeed(speed) {
            rightTrackSlider.value = speed;
            rightSpeedDisplay.textContent = `速度: ${speed}`;
            sendData(parseInt(leftTrackSlider.value), speed);
        }
        
        // 设置两个履带的速度
        function setBothSpeed(leftSpeed, rightSpeed) {
            leftTrackSlider.value = leftSpeed;
            rightTrackSlider.value = rightSpeed;
            leftSpeedDisplay.textContent = `速度: ${leftSpeed}`;
            rightSpeedDisplay.textContent = `速度: ${rightSpeed}`;
            sendData(leftSpeed, rightSpeed);
        }
    </script>
</body>
</html>
