<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坦克履带控制</title>

<style>
body {
    margin: 0;
    background: #111;
    color: #fff;
    user-select: none;
    touch-action: none;
    font-family: system-ui, sans-serif;
}

#controlArea {
    position: relative;
    width: 100vw;
    height: 100vh;
}

/* 履带 */
.track {
    position: absolute;
    top: 50%;
    width: 60px;
    height: 70%;
    background: linear-gradient(to top, rgba(255,255,255,0.15), rgba(255,255,255,0.05));
    border-radius: 30px;
    transform: translateY(-50%);
    backdrop-filter: blur(6px);
    transition: transform 0.1s;
}

#leftTrack { left: 20px; }
#rightTrack { right: 20px; }

/* 中央控制 */
#centralBtn {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 140px;
    height: 140px;
    margin-left: -70px;
    margin-top: -70px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    transition: background 0.2s;
}

#centralBtn.rotate {
    background: rgba(255,120,120,0.25);
}
</style>
</head>

<body>
<div id="controlArea">
    <div id="leftTrack" class="track"></div>
    <div id="rightTrack" class="track"></div>
    <div id="centralBtn">停止</div>
</div>

<script>
/* ========= 工具 ========= */
const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
const getRect = () => controlArea.getBoundingClientRect();

/* ========= 元素 ========= */
const controlArea = document.getElementById('controlArea');
const leftTrack = document.getElementById('leftTrack');
const rightTrack = document.getElementById('rightTrack');
const centralBtn = document.getElementById('centralBtn');

/* ========= 状态 ========= */
let leftDragging = false;
let rightDragging = false;
let centerDragging = false;

let rotateMode = false;
let longPressTimer = null;
let centerMoved = false;

/* ========= 速度 ========= */
let leftSpeed = 0;
let rightSpeed = 0;

/* ========= 发送占位 ========= */
function sendSpeed(l, r) {
    console.log(`L:${l}  R:${r}`);
}

/* ========= 视觉 ========= */
function updateTrackVisual() {
    const maxAngle = 12;
    const diff = (rightSpeed - leftSpeed) / 200 * maxAngle;
    leftTrack.style.transform = `translateY(-50%) rotate(${-diff}deg)`;
    rightTrack.style.transform = `translateY(-50%) rotate(${diff}deg)`;
}

function resetVisual() {
    leftTrack.style.transform = 'translateY(-50%) rotate(0deg)';
    rightTrack.style.transform = 'translateY(-50%) rotate(0deg)';
}

/* ========= 停止 ========= */
function stopAll() {
    leftSpeed = 0;
    rightSpeed = 0;
    sendSpeed(0, 0);
    centralBtn.textContent = '停止';
    centralBtn.classList.remove('rotate');
    rotateMode = false;
    resetVisual();
}

/* ========= 履带控制 ========= */
function dragTrack(e, side) {
    const rect = getRect();
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    const offset = clamp((rect.height / 2 - y) / (rect.height / 2), -1, 1);
    const speed = Math.round(offset * 100);

    if (side === 'left') leftSpeed = speed;
    else rightSpeed = speed;

    sendSpeed(leftSpeed, rightSpeed);
    updateTrackVisual();
}

/* ========= 中央控制 ========= */
function startCenter(e) {
    centerDragging = true;
    centerMoved = false;

    longPressTimer = setTimeout(() => {
        if (!centerMoved) {
            rotateMode = true;
            centralBtn.classList.add('rotate');
            centralBtn.textContent = '旋转';
        }
    }, 1000);
}

function dragCenter(e) {
    if (!centerDragging) return;
    centerMoved = true;

    const rect = getRect();
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const y = e.touches ? e.touches[0].clientY : e.clientY;

    let dx = clamp((x - rect.width / 2) / (rect.width / 2), -1, 1);
    let dy = clamp((rect.height / 2 - y) / (rect.height / 2), -1, 1);

    if (rotateMode) dy = 0;

    if (rotateMode) {
        const r = Math.round(dx * 80);
        leftSpeed = -r;
        rightSpeed = r;
    } else {
        const forward = dy * 100;
        const turn = dx * 80;
        leftSpeed = clamp(forward - turn, -100, 100);
        rightSpeed = clamp(forward + turn, -100, 100);
    }

    centralBtn.textContent =
        leftSpeed === 0 && rightSpeed === 0 ? '停止' : '控制';

    sendSpeed(leftSpeed, rightSpeed);
    updateTrackVisual();
}

function endCenter() {
    centerDragging = false;
    clearTimeout(longPressTimer);
    stopAll();
}

/* ========= 绑定 ========= */
leftTrack.onmousedown = e => leftDragging = true;
rightTrack.onmousedown = e => rightDragging = true;

document.onmousemove = e => {
    if (leftDragging) dragTrack(e, 'left');
    if (rightDragging) dragTrack(e, 'right');
};

document.onmouseup = () => {
    leftDragging = false;
    rightDragging = false;
};

leftTrack.ontouchstart = e => { leftDragging = true; e.preventDefault(); };
rightTrack.ontouchstart = e => { rightDragging = true; e.preventDefault(); };

leftTrack.ontouchmove = e => dragTrack(e, 'left');
rightTrack.ontouchmove = e => dragTrack(e, 'right');

leftTrack.ontouchend = rightTrack.ontouchend = () => {
    leftDragging = false;
    rightDragging = false;
};

centralBtn.onmousedown = startCenter;
centralBtn.onmousemove = dragCenter;
centralBtn.onmouseup = endCenter;
centralBtn.onmouseleave = endCenter;

centralBtn.ontouchstart = e => { startCenter(e); e.preventDefault(); };
centralBtn.ontouchmove = e => dragCenter(e);
centralBtn.ontouchend = endCenter;
</script>
</body>
</html>
